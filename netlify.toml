[build]
  command = "npm run build"
  publish = "out"
  # This site is Next.js with output: "export" — a pure static build.
  # Disable the Netlify Next.js runtime plugin so requests for unknown URLs
  # are served by Netlify's static CDN (clean 404) instead of being wrapped
  # in a serverless function that can crash and return 5xx.
  # This is the root cause of the 45K+ Server error (5xx) reports in GSC.
  [build.environment]
    NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# LLM SEO: serve markdown mirrors with correct content-type so AI crawlers
# (ChatGPT, Claude, Perplexity, Google AI Overviews) ingest them as plain text.
[[headers]]
  for = "/blog/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    X-Robots-Tag = "index, follow"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    X-Robots-Tag = "index, follow"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    X-Robots-Tag = "index, follow"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[redirects]]
  from = "/contact"
  to = "/locations"
  status = 301

[[redirects]]
  from = "/contact/*"
  to = "/locations"
  status = 301

[[redirects]]
  from = "/contact-us"
  to = "/locations"
  status = 301

[[redirects]]
  from = "/contact-us/*"
  to = "/locations"
  status = 301

# ---------------------------------------------------------------------------
# HACK RESIDUE CLEANUP — 410 Gone
# This site was previously compromised and Google Search Console still shows
# ~92K URLs from the old hacked install. Returning 410 (instead of 404) tells
# Google "this is permanently gone, remove it from the index" — de-indexing
# happens ~10x faster than a regular 404.
#
# Each rule uses force=true so it beats any static file that might exist,
# and status=410 which Google treats as a permanent removal signal.
# ---------------------------------------------------------------------------

# Hacked /products/* URLs — this site sells services, not products. Every
# /products/{numeric-id} URL in Google Search Console is hack residue from the
# previous compromised install and accounts for the bulk of the 92K bad URLs.
[[redirects]]
  from = "/products"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/products/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/product/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/shop/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/cart/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/checkout/*"
  to = "/404.html"
  status = 410
  force = true

# WordPress core paths (this site was never WordPress)
[[redirects]]
  from = "/wp-admin/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-content/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-includes/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-json/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-login.php"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/wp-*"
  to = "/404.html"
  status = 410
  force = true

# PHP files — this site is pure static, there are no legitimate .php URLs
[[redirects]]
  from = "/*.php"
  to = "/404.html"
  status = 410
  force = true

# WordPress query-style permalinks (?p=123, ?page_id=123, etc.)
[[redirects]]
  from = "/"
  query = {p = ":id"}
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/"
  query = {page_id = ":id"}
  to = "/404.html"
  status = 410
  force = true

# Common hacked-site spam paths
[[redirects]]
  from = "/cgi-bin/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/feed"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/feed/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/comments/feed/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/category/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/tag/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/author/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/?*s=*"
  to = "/404.html"
  status = 410
  force = true

# Backup / install / env files (common hack targets)
[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/.git/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/backup/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/install.php"
  to = "/404.html"
  status = 410
  force = true

# ---------------------------------------------------------------------------
# CLEAN 404 FALLBACK
# Absolute final rule — if nothing else matched, serve /404.html with a real
# HTTP 404 status. This ensures we NEVER return 5xx for missing pages.
# Without this, an unknown URL could slip through to the Netlify default
# handler which (with the Next.js plugin misconfigured) was producing 5xx.
# ---------------------------------------------------------------------------
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
