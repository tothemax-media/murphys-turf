[build]
  command = "npm run build"
  publish = "out"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# LLM SEO: serve markdown mirrors with correct content-type so AI crawlers
# (ChatGPT, Claude, Perplexity, Google AI Overviews) ingest them as plain text.
[[headers]]
  for = "/blog/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    X-Robots-Tag = "index, follow"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    X-Robots-Tag = "index, follow"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    X-Robots-Tag = "index, follow"
    Cache-Control = "public, max-age=3600, must-revalidate"

[[redirects]]
  from = "/contact"
  to = "/locations"
  status = 301

[[redirects]]
  from = "/contact/*"
  to = "/locations"
  status = 301

[[redirects]]
  from = "/contact-us"
  to = "/locations"
  status = 301

[[redirects]]
  from = "/contact-us/*"
  to = "/locations"
  status = 301
